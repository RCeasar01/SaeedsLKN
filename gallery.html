<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - Saeed's Bar & Grill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #faf8f5;
            color: #2c2c2c;
        }
        header {
            background: linear-gradient(160deg, #6b2d0e 0%, #8B4513 60%, #a0522d 100%);
            color: white;
            text-align: center;
            padding: 3.5rem 2rem 3rem;
        }
        header img {
            max-height: 200px;
            width: auto;
            margin-bottom: 1.25rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        nav {
            background-color: #1e1e1e;
            padding: 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            color: #e0d5c8;
            display: inline-block;
            padding: 1rem 1.1rem;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            transition: color 0.2s, background 0.2s;
        }
        nav a:hover, nav a.active {
            color: #ffffff;
            background-color: #8B4513;
        }
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        main > h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #6b2d0e;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e8d5c0;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }
        .gallery-item {
            background: white;
            border: 1px solid #e8e2d9;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gallery-item:hover {
            transform: scale(1.02);
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .lightbox.open { display: flex; }
        .lightbox img {
            max-width: 90vw;
            max-height: 88vh;
            border-radius: 8px;
            object-fit: contain;
        }
        .lightbox-close {
            position: absolute;
            top: 1rem;
            right: 1.25rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
            background: none;
            border: none;
        }
        .lightbox-prev, .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0 1rem;
            opacity: 0.75;
            transition: opacity 0.2s;
        }
        .lightbox-prev:hover, .lightbox-next:hover { opacity: 1; }
        .lightbox-prev { left: 0.5rem; }
        .lightbox-next { right: 0.5rem; }

        footer {
            background-color: #1e1e1e;
            color: #a09080;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.875rem;
            margin-top: 4rem;
        }
    </style>
</head>

        var photos = [
            "photos/128424093_3682381335133880_3642244218304746751_n.jpg",

            "photos/655552888_26458328133779210_7054103459012928351_n.jpg",
            "photos/655880811_26458327997112557_4541499974108045212_n.jpg",
            "photos/656709618_26458958273716196_1761227282057982624_n.jpg",
            "photos/656811264_26458958453716178_4336193960823028157_n.jpg",
            "photos/696771410_18531531619076981_5851097450229697653_n.jpg",
            "photos/ASDFASW.jpg",
            "photos/FSADFAS.jpg",
            "photos/SADFAS.jpg",
            "photos/SDAFASD.jpg",
            "photos/SDFAS.jpg",
            "photos/WEDSGS.jpg",
            "photos/fdbS.jpg"
        ];
        var current = 0;
        function openLightbox(i) {
            current = i;
            document.getElementById("lightbox-img").src = photos[i];
            document.getElementById("lightbox").classList.add("open");
        }
        function closeLightbox() {
            document.getElementById("lightbox").classList.remove("open");
        }
        function changePhoto(dir) {
            current = (current + dir + photos.length) % photos.length;
            document.getElementById("lightbox-img").src = photos[current];
        }
        document.getElementById("lightbox").addEventListener("click", function(e) {
            if (e.target === this) closeLightbox();
        });
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") closeLightbox();
            if (e.key === "ArrowLeft") changePhoto(-1);
            if (e.key === "ArrowRight") changePhoto(1);
        });
    </script>
