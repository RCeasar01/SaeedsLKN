        }
        .nav-cta:hover { background: #6b2d0e; }
        .page-hero {
            height: 280px; position: relative; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .page-hero-bg {
            position: absolute; inset: 0;
            background: url('photos/655880811_26458327997112557_4541499974108045212_n.jpg') center/cover no-repeat;
        }
        .page-hero-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.65); }
        .page-hero-content { position: relative; z-index: 1; padding-top: 68px; }
        .page-hero-content h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 700; }
        main { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 5rem; }
        main > h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #e8c99a; margin-bottom: 1.5rem; padding-bottom: 0.6rem; border-bottom: 1px solid #333; }
        .gallery { columns: 3; column-gap: 0.75rem; }
        @media (max-width: 800px) { .gallery { columns: 2; } }
        @media (max-width: 480px) { .gallery { columns: 1; } }
        .gallery-item { break-inside: avoid; margin-bottom: 0.75rem; overflow: hidden; border-radius: 6px; cursor: pointer; }
        .gallery-item img { width: 100%; height: auto; display: block; transition: opacity 0.2s; image-rendering: auto; }
        .gallery-item:hover img { opacity: 0.88; }
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 999; align-items: center; justify-content: center; }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 88vh; border-radius: 6px; object-fit: contain; }
        .lightbox-close { position: absolute; top: 1rem; right: 1.25rem; color: white; font-size: 2rem; cursor: pointer; background: none; border: none; }
        .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 2.5rem; cursor: pointer; background: none; border: none; padding: 0 1rem; opacity: 0.7; transition: opacity 0.2s; }
        .lightbox-prev:hover, .lightbox-next:hover { opacity: 1; }
        .lightbox-prev { left: 0.5rem; }
        .lightbox-next { right: 0.5rem; }
        footer { background: #0a0a0a; color: #888; text-align: center; padding: 2rem; font-size: 0.85rem; border-top: 1px solid #222; }
        footer a { color: #8B4513; text-decoration: none; }
    </style>

    <script>
        var photos = ["photos/128424093_3682381335133880_3642244218304746751_n.jpg","photos/128773473_3685702414801772_6158260303606198336_n.jpg","photos/348s.jpg","photos/45146879_2047468181958545_916231448971706368_n.jpg","photos/45175822_2047685171936846_5445614641193418752_n.jpg","photos/45210341_2044611095577587_3467301697624211456_n.jpg","photos/572111363_18491483800076981_3798658704764823430_n.jpg","photos/646324680_26280821478196544_2964051359761019433_n.jpg","photos/649686967_26326300026982022_2908157878727322816_n.jpg","photos/654216517_26458327960445894_1844558807287738912_n.jpg","photos/655552888_26458328133779210_7054103459012928351_n.jpg","photos/655880811_26458327997112557_4541499974108045212_n.jpg","photos/656709618_26458958273716196_1761227282057982624_n.jpg","photos/656811264_26458958453716178_4336193960823028157_n.jpg","photos/696771410_18531531619076981_5851097450229697653_n.jpg","photos/ASDFASW.jpg","photos/FSADFAS.jpg","photos/SADFAS.jpg","photos/SDAFASD.jpg","photos/SDFAS.jpg","photos/WEDSGS.jpg","photos/fdbS.jpg"];
        var current = 0;
        function openLightbox(i) { current = i; document.getElementById("lightbox-img").src = photos[i]; document.getElementById("lightbox").classList.add("open"); }
        function closeLightbox() { document.getElementById("lightbox").classList.remove("open"); }
        function changePhoto(dir) { current = (current + dir + photos.length) % photos.length; document.getElementById("lightbox-img").src = photos[current]; }
        document.getElementById("lightbox").addEventListener("click", function(e) { if (e.target === this) closeLightbox(); });
        document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeLightbox(); if (e.key === "ArrowLeft") changePhoto(-1); if (e.key === "ArrowRight") changePhoto(1); });
    </script>
