<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saeed's LKN — Coming Soon</title>
  <meta name="description" content="Saeed's LKN — Under Development. Something great is coming.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');

    :root {
      --bg: #0a0a0a;
      --white: #ffffff;
      --accent: #c8a96e;
      --muted: rgba(255,255,255,0.45);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    /* subtle texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(200,169,110,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      padding: 2rem 1.5rem;
      max-width: 560px;
    }

    .logo-wrap {
      margin-bottom: 2.5rem;
    }
    .logo-wrap img {
      max-width: 280px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(200,169,110,0.4);
      color: var(--accent);
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.4em 1.1em;
      margin-bottom: 2rem;
    }
    .badge-dot {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.3; transform:scale(0.6); }
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.15;
      margin-bottom: 1.25rem;
    }
    h1 span { color: var(--accent); }

    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .cta {
      display: inline-block;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.75em 2em;
      text-decoration: none;
      transition: background 0.25s, color 0.25s;
    }
    .cta:hover { background: var(--accent); color: var(--bg); }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="logo-wrap">
      <img src="saeeds_logo_trans.png" alt="Saeed's LKN">
    </div>

    <div class="divider"></div>

    <div class="badge">
      <span class="badge-dot"></span>
      Under Development
    </div>

    <h1>Something <span>Great</span><br>Is Coming</h1>

    <p>We're putting the finishing touches on the new Saeed's LKN experience. Check back soon for our full menu, daily specials, events, and more.</p>

    <a href="mailto:info@saeedslkn.com" class="cta">Get Notified</a>
  </div>

  <div class="footer">&copy; 2026 Saeed's LKN &nbsp;&mdash;&nbsp; saeedslkn.com</div>

</body>
</html>
